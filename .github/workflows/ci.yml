name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      localstack:
        image: localstack/localstack:latest
        ports:
          - 4566:4566
        env:
          SERVICES: s3
          DEBUG: "0"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Wait for LocalStack
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:4566/_localstack/health | grep -q '"s3": "available"'; then
              echo "LocalStack ready"
              break
            fi
            echo "Waiting for LocalStack ($i/30)..."
            sleep 2
          done

      - name: Run unit tests
        run: cargo test -p sulfite

      - name: Run LocalStack integration tests
        env:
          LOCALSTACK_ENDPOINT: http://localhost:4566
        run: cargo test -p sulfite --test localstack -- --ignored
