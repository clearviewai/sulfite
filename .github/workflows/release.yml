# Build release binaries and publish to GitHub Releases.
# Push a tag (e.g. v0.0.10) to trigger: git tag v0.0.10 && git push origin v0.0.10

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native Linux builds (no cross-compile)
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact_name: sulfite-x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_name: sulfite-aarch64-unknown-linux-gnu
          # macOS: macos-latest is Apple Silicon; aarch64 is native, x86_64 is cross-compiled
          - runner: macos-latest
            target: aarch64-apple-darwin
            artifact_name: sulfite-aarch64-apple-darwin
          - runner: macos-latest
            target: x86_64-apple-darwin
            artifact_name: sulfite-x86_64-apple-darwin

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build -p sulfite-tools --release --target ${{ matrix.target }}

      - name: Prepare archive
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact_name }}.tar.gz sulfite
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move artifacts to dist/
        run: |
          mkdir -p dist
          for d in artifacts/*/; do
            for f in "$d"/*; do
              cp "$f" "dist/$(basename "$f")"
            done
          done
          ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
